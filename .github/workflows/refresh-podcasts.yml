name: Refresh podcasts

# Fetches the RSS feeds server-side (no browser CORS problem) and commits an
# updated podcasts.json. Scheduled runs only fire from the default branch.
on:
  schedule:
    - cron: '0 */6 * * *'      # every 6 hours
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [ main ]
    paths:                      # refresh immediately when the feed list changes
      - 'feeds.json'
      - 'feed2json.py'
      - '.github/workflows/refresh-podcasts.yml'

permissions:
  contents: write

concurrency:
  group: refresh-podcasts
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build podcasts.json
        run: python3 feed2json.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add podcasts.json
          if git diff --cached --quiet; then
            echo "podcasts.json unchanged — nothing to commit."
          else
            git commit -m "Refresh podcasts.json [skip ci]"
            git push
          fi
