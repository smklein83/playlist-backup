name: Refresh podcasts

# Fetches the RSS feeds server-side (no browser CORS problem), commits an
# updated podcasts.json, and asks GitHub Pages to redeploy so the *live* site
# actually serves the fresh file. Scheduled runs only fire from the default branch.
#
# Why the explicit Pages rebuild matters: this job commits with the built-in
# GITHUB_TOKEN, and GitHub does NOT auto-trigger a "Deploy from a branch" Pages
# build for pushes made by GITHUB_TOKEN (a loop-prevention rule). Without the
# rebuild step below, podcasts.json keeps advancing in the repo while the
# deployed site stays frozen at the last *human* push — the app looks stuck days
# or weeks in the past even though every scheduled run "succeeds".
on:
  schedule:
    - cron: '0 */6 * * *'      # every 6 hours
  workflow_dispatch: {}         # manual "Run workflow" button
  push:
    branches: [ main ]
    paths:                      # refresh immediately when the feed list changes
      - 'feeds.json'
      - 'feed2json.py'
      - '.github/workflows/refresh-podcasts.yml'

permissions:
  contents: write               # commit the refreshed podcasts.json
  pages: write                  # request a Pages rebuild via the REST API

concurrency:
  group: refresh-podcasts
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build podcasts.json
        env:
          # Private/paid feed URLs live in repo Secrets, never in the code. Add
          # one Secret per private feed and map it here, then reference it from
          # feeds.json with { "name": "...", "feedEnv": "SUBSTACK_FEED" }.
          SUBSTACK_FEED: ${{ secrets.SUBSTACK_FEED }}
        run: python3 feed2json.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add podcasts.json
          if git diff --cached --quiet; then
            echo "podcasts.json unchanged — nothing to commit."
          else
            git commit -m "Refresh podcasts.json [skip ci]"
            git push
          fi

      # A GITHUB_TOKEN push does not trigger the automatic branch-based Pages
      # build, so request one explicitly. Runs every time (cheap, and self-heals
      # if an earlier deploy was missed) and never fails the job on its own.
      - name: Redeploy GitHub Pages
        run: |
          echo "Requesting a GitHub Pages rebuild of the current source branch…"
          code=$(curl -sS -o /tmp/pages.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds")
          echo "GitHub Pages build API responded HTTP $code"
          cat /tmp/pages.json || true
          if [ "$code" != "201" ]; then
            echo "::warning::Pages rebuild request returned HTTP $code (expected 201). \
          If your Pages Source is 'GitHub Actions' instead of 'Deploy from a branch', \
          this endpoint returns 404 — switch Settings ▸ Pages ▸ Source to 'Deploy from a \
          branch', or replace this step with the actions/deploy-pages workflow."
          fi
